name: cd-staging

# CD pipeline → staging (Phase 5, design §3.3 step 3-4). Triggered by
# ci-build's repository_dispatch event. Runs `helm upgrade --install` against
# the staging cluster, then runs a smoke test against the resulting URL.

on:
  repository_dispatch:
    types: [cd-staging]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Image tag (short SHA) to deploy'
        required: true

permissions:
  contents: read
  id-token: write   # for cloud OIDC

env:
  CLUSTER_NAME: wcp-staging
  NAMESPACE: wcp-staging
  CHART_DIR: worldcup-predictor/deploy/charts

jobs:
  deploy:
    name: helm upgrade · staging
    runs-on: ubuntu-22.04
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          TAG="${{ github.event.client_payload.sha }}"
          if [ -z "$TAG" ]; then TAG="${{ inputs.sha }}"; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # Cloud auth — placeholder. Swap for aws-actions/configure-aws-credentials
      # or aliyun/setup-cli depending on the chosen provider (see design §2.1).
      # Until a real cluster is provisioned, gate downstream steps behind the
      # presence of a STAGING_KUBECONFIG secret so the workflow can be exercised
      # end-to-end without failing on missing infra.
      - name: Configure cloud credentials
        id: kubeauth
        env:
          KUBECONFIG_B64: ${{ secrets.STAGING_KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "::warning ::STAGING_KUBECONFIG not set — running chart-template dry-run only"
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            mkdir -p "$HOME/.kube"
            echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup kubectl + helm
        uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4

      - name: helm template (dry-run validation)
        if: steps.kubeauth.outputs.configured != 'true'
        run: |
          for svc in wcp-frontend wcp-java-api wcp-ml-api wcp-workers; do
            echo "=== helm template $svc ==="
            helm template $svc $CHART_DIR/$svc \
              --namespace $NAMESPACE \
              --set image.tag=${{ steps.tag.outputs.tag }} \
              --set environment=staging > /dev/null
          done
          echo "::notice ::All 4 charts render OK; cluster deploy skipped (no STAGING_KUBECONFIG)"

      - name: helm upgrade --install
        if: steps.kubeauth.outputs.configured == 'true'
        run: |
          for svc in wcp-frontend wcp-java-api wcp-ml-api wcp-workers; do
            helm upgrade --install $svc $CHART_DIR/$svc \
              --namespace $NAMESPACE --create-namespace \
              --set image.tag=${{ steps.tag.outputs.tag }} \
              --set environment=staging \
              --wait --timeout 5m
          done

      - name: Smoke test
        if: steps.kubeauth.outputs.configured == 'true'
        run: |
          BASE_URL="${{ vars.STAGING_BASE_URL }}"
          if [ -z "$BASE_URL" ]; then BASE_URL="https://staging.wcp.example"; fi
          curl --fail --silent "$BASE_URL/health" || (echo "smoke test failed" && exit 1)
